<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelajahi Destinasi | NusantaraTrip</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1',
                            600: '#4f46e5', // Primary Indigo
                            700: '#4338ca', 900: '#312e81',
                        },
                        accent: {
                            400: '#fb923c', 500: '#f97316', 600: '#ea580c', // Orange
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        
        /* Custom Scrollbar untuk Filter Sidebar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Custom Checkbox SaaS Style */
        .check-saas {
            appearance: none;
            width: 18px; height: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .check-saas:checked {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .check-saas:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: white;
            font-size: 10px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Hover Card Animations */
        .dest-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .dest-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(79, 70, 229, 0.2); 
            border-color: #c7d2fe;
        }
        .dest-image-wrap { overflow: hidden; }
        .dest-card:hover .dest-img { transform: scale(1.1) rotate(1deg); }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden pt-6 pb-12">

    <!-- MAIN CONTAINER -->
    <main class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 flex flex-col lg:flex-row gap-6 lg:gap-8">
        
        <!-- ========================================== -->
        <!-- SIDEBAR FILTER (KIRI)                      -->
        <!-- ========================================== -->
        <aside class="w-full lg:w-[280px] xl:w-[320px] flex-shrink-0">
            <!-- Mobile Filter Toggle -->
            <button class="lg:hidden w-full bg-white border border-slate-200 text-brand-900 font-bold py-3 rounded-xl shadow-sm mb-4 flex justify-between items-center px-4" onclick="document.getElementById('filter-content').classList.toggle('hidden')">
                <span><i class="fa-solid fa-sliders text-brand-600 mr-2"></i> Filter Destinasi</span>
                <i class="fa-solid fa-chevron-down"></i>
            </button>

            <!-- Filter Content (Sticky on Desktop) -->
            <div id="filter-content" class="hidden lg:block sticky top-6 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden h-max max-h-[90vh] flex flex-col">
                
                <!-- Filter Header -->
                <div class="p-4 sm:p-5 border-b border-slate-100 flex justify-between items-center bg-brand-50/50">
                    <h2 class="font-extrabold text-brand-900 text-base"><i class="fa-solid fa-filter text-brand-600 mr-1.5"></i> Filter Destinasi</h2>
                    <button onclick="resetFilters()" class="text-[11px] font-bold text-slate-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-rotate-right mr-1"></i>Reset</button>
                </div>

                <!-- Filter Body (Scrollable) -->
                <div class="p-4 sm:p-5 overflow-y-auto custom-scrollbar flex flex-col gap-6">
                    
                    <!-- 1. Search Destinasi -->
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-2">Cari Kota / Negara</label>
                        <div class="relative group">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 group-focus-within:text-brand-600 transition-colors text-sm"></i>
                            <input type="text" id="filter-search" placeholder="Cari Tokyo, Bali..." class="w-full bg-slate-50 border border-slate-200 text-sm rounded-lg pl-9 pr-3 py-2.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all font-medium">
                        </div>
                    </div>

                    <!-- 2. Tema / Vibe Destinasi -->
                    <div class="border-t border-slate-100 pt-5">
                        <label class="block text-xs font-bold text-slate-700 mb-3">Tema Liburan (Vibe)</label>
                        <div class="space-y-2.5">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox">
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors"><i class="fa-solid fa-umbrella-beach text-blue-400 w-4 text-center mr-1"></i> Pantai & Pulau</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox">
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors"><i class="fa-solid fa-mountain text-emerald-500 w-4 text-center mr-1"></i> Pegunungan & Alam</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox" checked>
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors"><i class="fa-solid fa-city text-slate-500 w-4 text-center mr-1"></i> Perkotaan (City Vibe)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox">
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors"><i class="fa-brands fa-fort-awesome text-yellow-600 w-4 text-center mr-1"></i> Budaya & Sejarah</span>
                            </label>
                        </div>
                    </div>

                    <!-- 3. Wilayah (Region) -->
                    <div class="border-t border-slate-100 pt-5">
                        <label class="block text-xs font-bold text-slate-700 mb-3">Wilayah (Region)</label>
                        <div class="space-y-2.5">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox" checked>
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors">Indonesia (Domestik) <span class="text-[10px] text-slate-400 ml-1">(24)</span></span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox" checked>
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors">Asia Timur <span class="text-[10px] text-slate-400 ml-1">(12)</span></span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox">
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors">Asia Tenggara <span class="text-[10px] text-slate-400 ml-1">(8)</span></span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox">
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors">Eropa <span class="text-[10px] text-slate-400 ml-1">(15)</span></span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="check-saas filter-checkbox">
                                <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600 transition-colors">Timur Tengah <span class="text-[10px] text-slate-400 ml-1">(5)</span></span>
                            </label>
                        </div>
                    </div>

                    <!-- 4. Syarat Visa -->
                    <div class="border-t border-slate-100 pt-5">
                        <label class="block text-xs font-bold text-slate-700 mb-3">Persyaratan Visa Pribadi</label>
                        <div class="flex flex-wrap gap-2">
                            <label class="cursor-pointer">
                                <input type="checkbox" class="peer sr-only filter-checkbox">
                                <div class="px-3 py-1.5 border border-slate-200 rounded-lg text-xs font-bold text-slate-600 peer-checked:bg-brand-50 peer-checked:text-brand-600 peer-checked:border-brand-500 hover:bg-slate-50 transition-colors">Bebas Visa</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="checkbox" class="peer sr-only filter-checkbox">
                                <div class="px-3 py-1.5 border border-slate-200 rounded-lg text-xs font-bold text-slate-600 peer-checked:bg-brand-50 peer-checked:text-brand-600 peer-checked:border-brand-500 hover:bg-slate-50 transition-colors">Visa on Arrival (VOA)</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="checkbox" class="peer sr-only filter-checkbox">
                                <div class="px-3 py-1.5 border border-slate-200 rounded-lg text-xs font-bold text-slate-600 peer-checked:bg-brand-50 peer-checked:text-brand-600 peer-checked:border-brand-500 hover:bg-slate-50 transition-colors">Wajib Visa (Kami Bantu)</div>
                            </label>
                        </div>
                    </div>

                    <!-- 5. Estimasi Budget Liburan -->
                    <div class="border-t border-slate-100 pt-5 mb-2">
                        <label class="block text-xs font-bold text-slate-700 mb-3">Estimasi Biaya Destinasi</label>
                        <div class="space-y-2.5">
                            <label class="flex items-center justify-between cursor-pointer group">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" class="check-saas filter-checkbox">
                                    <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600">Ekonomis</span>
                                </div>
                                <span class="text-green-500 font-bold text-sm">$</span>
                            </label>
                            <label class="flex items-center justify-between cursor-pointer group">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" class="check-saas filter-checkbox">
                                    <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600">Menengah</span>
                                </div>
                                <span class="text-green-500 font-bold text-sm">$$</span>
                            </label>
                            <label class="flex items-center justify-between cursor-pointer group">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" class="check-saas filter-checkbox">
                                    <span class="text-sm font-medium text-slate-600 group-hover:text-brand-600">Premium / Mewah</span>
                                </div>
                                <span class="text-green-500 font-bold text-sm">$$$</span>
                            </label>
                        </div>
                    </div>

                </div>
                
                <!-- Filter Action Button -->
                <div class="p-4 border-t border-slate-100 bg-white">
                    <button onclick="simulateFilter()" class="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm rounded-lg shadow-md shadow-brand-500/30 transition-colors flex items-center justify-center gap-2">
                        <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                        <span id="btn-text">Terapkan Filter</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- ========================================== -->
        <!-- MAIN CONTENT (KANAN) GRID DESTINASI        -->
        <!-- ========================================== -->
        <div class="flex-1 w-full">
            
            <!-- Breadcrumbs & Quick Tags -->
            <div class="mb-5 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4">
                <div>
                    <nav class="flex text-[10px] sm:text-xs text-slate-400 font-medium mb-2" aria-label="Breadcrumb">
                        <ol class="inline-flex items-center space-x-1 md:space-x-2">
                            <li class="inline-flex items-center"><a href="#" class="hover:text-brand-600 transition-colors">Beranda</a></li>
                            <li><div class="flex items-center"><i class="fa-solid fa-chevron-right text-[8px] mx-1"></i><span class="text-slate-600 font-bold">Destinasi</span></div></li>
                        </ol>
                    </nav>
                    <h1 class="text-2xl sm:text-3xl font-extrabold text-brand-900 tracking-tight">Eksplorasi Destinasi Populer</h1>
                    <p class="text-slate-500 text-xs sm:text-sm mt-1 font-medium">Temukan kota atau negara impianmu dan lihat <span class="text-brand-600 font-bold" id="total-result">64</span> destinasi yang tersedia.</p>
                </div>

                <!-- Sort Dropdown (SaaS Style) -->
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-500">Urutkan:</span>
                    <div class="relative group">
                        <select class="appearance-none bg-white border border-slate-200 text-brand-900 text-xs sm:text-sm font-bold rounded-lg pl-3 pr-8 py-2 focus:outline-none focus:border-brand-500 shadow-sm cursor-pointer hover:bg-slate-50 transition-colors">
                            <option>Paling Populer</option>
                            <option>Sedang Tren (Trending)</option>
                            <option>A - Z (Abjad)</option>
                            <option>Paket Terbanyak</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-[10px] pointer-events-none"></i>
                    </div>
                </div>
            </div>

            <!-- Tags Kategori Cepat (Marketplace Style) -->
            <div class="flex flex-wrap gap-2 mb-6">
                <button class="px-3 py-1.5 bg-brand-600 text-white text-[11px] font-bold rounded-full shadow-sm shadow-brand-500/30 transition-all"><i class="fa-solid fa-fire mr-1 text-yellow-300"></i> Trending Sekarang</button>
                <button class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 hover:border-brand-600 hover:text-brand-600 text-[11px] font-bold rounded-full shadow-sm transition-all">Jepang</button>
                <button class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 hover:border-brand-600 hover:text-brand-600 text-[11px] font-bold rounded-full shadow-sm transition-all">Turki</button>
                <button class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 hover:border-brand-600 hover:text-brand-600 text-[11px] font-bold rounded-full shadow-sm transition-all">Bali</button>
                <button class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 hover:border-brand-600 hover:text-brand-600 text-[11px] font-bold rounded-full shadow-sm transition-all">Labuan Bajo</button>
            </div>

            <!-- GRID DESTINASI -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6" id="dest-grid">
                <!-- Data ini akan dirender via JavaScript di bagian bawah -->
            </div>

            <!-- PAGING (PAGINATION) -->
            <div class="mt-10 pt-6 border-t border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                <p class="text-xs font-medium text-slate-500">Menampilkan 1-12 dari 64 destinasi</p>
                
                <nav class="inline-flex shadow-sm rounded-lg" aria-label="Pagination">
                    <!-- Prev Button -->
                    <button class="relative inline-flex items-center px-3 py-2 rounded-l-lg border border-slate-200 bg-white text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-brand-600 transition-colors">
                        <i class="fa-solid fa-chevron-left text-[10px]"></i>
                    </button>
                    <!-- Numbers -->
                    <button class="relative inline-flex items-center px-3.5 py-2 border border-slate-200 bg-brand-600 text-sm font-extrabold text-white">
                        1
                    </button>
                    <button class="relative inline-flex items-center px-3.5 py-2 border border-slate-200 bg-white text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-brand-600 transition-colors">
                        2
                    </button>
                    <button class="hidden sm:inline-flex relative items-center px-3.5 py-2 border border-slate-200 bg-white text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-brand-600 transition-colors">
                        3
                    </button>
                    <!-- Next Button -->
                    <button class="relative inline-flex items-center px-3 py-2 rounded-r-lg border border-slate-200 bg-white text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-brand-600 transition-colors group">
                        <span class="mr-1 text-xs group-hover:text-brand-600">Next</span> <i class="fa-solid fa-chevron-right text-[10px]"></i>
                    </button>
                </nav>
            </div>

        </div>
    </main>

    <!-- JAVASCRIPT & DATA DUMMY -->
    <script>
        // Data Dummy untuk Destinasi
        const destData = [
            {
                img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=800",
                name: "Tokyo",
                country: "Jepang",
                flag: "jp",
                tourCount: 45,
                vibe: "City Vibe",
                budget: "$$$"
            },
            {
                img: "https://images.unsplash.com/photo-1541432901042-2d8bd64b4a9b?w=800",
                name: "Cappadocia",
                country: "Turki",
                flag: "tr",
                tourCount: 28,
                vibe: "Budaya & Sejarah",
                budget: "$$"
            },
            {
                img: "https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=800",
                name: "Bali",
                country: "Indonesia",
                flag: "id",
                tourCount: 124,
                vibe: "Pantai & Budaya",
                budget: "$$"
            },
            {
                img: "https://images.unsplash.com/photo-1530122037265-a5f1f91d3b99?w=800",
                name: "Zermatt",
                country: "Swiss",
                flag: "ch",
                tourCount: 15,
                vibe: "Pegunungan Salju",
                budget: "$$$"
            },
            {
                img: "https://images.unsplash.com/photo-1588668214407-6ea9a6d8c272?w=800",
                name: "Seoul",
                country: "Korea Selatan",
                flag: "kr",
                tourCount: 38,
                vibe: "City & Budaya",
                budget: "$$"
            },
            {
                img: "https://images.unsplash.com/photo-1542898939-5e5f385c5dfa?w=800",
                name: "Gunung Bromo",
                country: "Indonesia",
                flag: "id",
                tourCount: 85,
                vibe: "Alam & Petualangan",
                budget: "$"
            },
            {
                img: "https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=800",
                name: "Paris",
                country: "Prancis",
                flag: "fr",
                tourCount: 22,
                vibe: "Romantis & Kota",
                budget: "$$$"
            },
            {
                img: "https://images.unsplash.com/photo-1505993597083-3bd19fa85e74?w=800",
                name: "Labuan Bajo",
                country: "Indonesia",
                flag: "id",
                tourCount: 42,
                vibe: "Pantai & Eksotis",
                budget: "$$"
            },
            {
                img: "https://images.unsplash.com/photo-1520109971360-63ce771415eb?w=800",
                name: "Singapura",
                country: "Singapura",
                flag: "sg",
                tourCount: 56,
                vibe: "City Vibe",
                budget: "$$"
            },
            {
                img: "https://images.unsplash.com/photo-1518684079-3c830dcef090?w=800",
                name: "Dubai",
                country: "UEA",
                flag: "ae",
                tourCount: 30,
                vibe: "Mewah & Gurun",
                budget: "$$$"
            },
            {
                img: "https://images.unsplash.com/photo-1512100356356-de1b84283e18?w=800",
                name: "Nusa Penida",
                country: "Indonesia",
                flag: "id",
                tourCount: 65,
                vibe: "Pantai & Eksotis",
                budget: "$"
            },
            {
                img: "https://images.unsplash.com/photo-1503899036084-c55cdd92da26?w=800",
                name: "Kyoto",
                country: "Jepang",
                flag: "jp",
                tourCount: 20,
                vibe: "Budaya Tradisional",
                budget: "$$$"
            }
        ];

        const gridContainer = document.getElementById('dest-grid');

        // Fungsi Render Card Destinasi
        function renderCards() {
            gridContainer.innerHTML = '';
            destData.forEach(dest => {
                
                // Card UI untuk Destinasi lebih fokus ke gambar visual dan vibe
                const cardHTML = `
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden cursor-pointer group dest-card flex flex-col relative h-[320px]">
                    
                    <!-- Background Image Cover (Full Height) -->
                    <div class="absolute inset-0 dest-image-wrap bg-slate-200">
                        <img src="${dest.img}" class="w-full h-full object-cover dest-img transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/40 to-transparent"></div>
                    </div>
                    
                    <!-- Tags / Budget on Top -->
                    <div class="relative z-10 p-4 flex justify-between items-start">
                        <span class="bg-white/20 backdrop-blur-md border border-white/30 text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">
                            <i class="fa-solid fa-tag mr-1"></i> ${dest.vibe}
                        </span>
                        <div class="bg-slate-900/60 backdrop-blur text-green-400 font-extrabold text-[10px] px-2 py-1 rounded-full border border-green-400/30">
                            ${dest.budget}
                        </div>
                    </div>

                    <!-- Destination Info on Bottom -->
                    <div class="relative z-10 mt-auto p-5 pb-6">
                        <div class="flex items-center gap-2 mb-1.5 opacity-90">
                            <img src="https://flagcdn.com/w20/${dest.flag}.png" alt="${dest.country}" class="w-4 rounded-sm shadow-sm">
                            <span class="text-[10px] sm:text-xs font-bold text-slate-300 uppercase tracking-wider">${dest.country}</span>
                        </div>
                        
                        <h3 class="font-extrabold text-white text-xl sm:text-2xl mb-1 group-hover:text-accent-400 transition-colors drop-shadow-md">
                            ${dest.name}
                        </h3>
                        
                        <p class="text-xs text-slate-300 font-medium drop-shadow-sm mb-4">
                            Tersedia <span class="text-white font-bold">${dest.tourCount}</span> pilihan paket tour.
                        </p>

                        <!-- Action Button -->
                        <div class="flex items-center text-xs font-bold text-white group-hover:text-accent-400 transition-colors">
                            Lihat Paket Tour <i class="fa-solid fa-arrow-right-long ml-2 transform group-hover:translate-x-2 transition-transform"></i>
                        </div>
                    </div>
                </div>
                `;
                gridContainer.innerHTML += cardHTML;
            });
        }

        // Render card saat load
        renderCards();

        // --- SIMULASI FILTER ---
        function simulateFilter() {
            const btn = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            
            // Animasi tombol
            btn.innerText = "Mencari...";
            spinner.classList.remove('hidden');
            gridContainer.style.opacity = '0.5';

            // Simulasi proses delay
            setTimeout(() => {
                btn.innerText = "Terapkan Filter";
                spinner.classList.add('hidden');
                gridContainer.style.opacity = '1';
                
                // Ubah angka total secara acak
                document.getElementById('total-result').innerText = Math.floor(Math.random() * 50) + 10;
            }, 800);
        }

        // --- RESET FILTER ---
        function resetFilters() {
            document.getElementById('filter-search').value = '';
            
            const checkboxes = document.querySelectorAll('.filter-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
            
            simulateFilter();
        }
    </script>
</body>
</html>
