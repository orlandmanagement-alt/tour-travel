        /* Custom Scrollbar untuk Filter Sidebar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Custom Checkbox SaaS Style */
        .check-saas {
            appearance: none;
            width: 18px; height: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .check-saas:checked {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .check-saas:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: white;
            font-size: 10px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Hover Card Animations */
        .tour-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .tour-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(79, 70, 229, 0.15); 
            border-color: #c7d2fe;

                    </button>
                </nav>
            </div>

        </div>

                img: "https://images.unsplash.com/photo-1512100356356-de1b84283e18?w=600", // Nusa Penida
                regionType: "DOM",
                regionColor: "bg-red-600",
                type: "PRIVATE",
                color: "text-accent-600",
                duration: "1 Hari",
                location: "Start Sanur",
                title: "Private One Day Tour Nusa Penida Barat",
                rating: "4.8",
                reviews: "542",
                oldPrice: "Rp 850.000",
                newPrice: "650",
                unit: "k/pax",
                flight: false
            },
            {
                img: "https://images.unsplash.com/photo-1518684079-3c830dcef090?w=600", // Dubai
                regionType: "INTL",
                regionColor: "bg-blue-600",
                type: "HONEYMOON",
                color: "text-pink-500",
                duration: "5D4N",
                location: "Dubai - Abu Dhabi",
                title: "Dubai Desert Safari & Burj Khalifa Experience",
                rating: "4.9",
                reviews: "185",
                oldPrice: "Rp 14.500.000",
                newPrice: "12.900",
                unit: "k/pax",
                flight: true
            }
        ];

        const gridContainer = document.getElementById('tour-grid');

        // Fungsi Render Card
        function renderCards() {
            gridContainer.innerHTML = '';
            tourData.forEach(tour => {
                
                // Cek apakah ada harga coret
                const priceHTML = tour.oldPrice 
                    ? `<p class="text-[9px] sm:text-[10px] text-slate-400 line-through">${tour.oldPrice}</p>
                       <p class="text-accent-600 font-extrabold text-sm sm:text-base leading-none">Rp ${tour.newPrice}<span class="text-[8px] sm:text-[10px] font-medium text-slate-500">${tour.unit}</span></p>`
                    : `<p class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase">Mulai Dari</p>
                       <p class="text-brand-600 font-extrabold text-sm sm:text-base leading-none">Rp ${tour.newPrice}<span class="text-[8px] sm:text-[10px] font-medium text-slate-500">${tour.unit}</span></p>`;
                
                // Ikon Wilayah (Globe untuk Intl, Map untuk Domestik)
                const regionIcon = tour.regionType === "INTL" ? "fa-solid fa-globe" : "fa-solid fa-map";
                
                // Flight Included indicator
                const flightBadge = tour.flight 
                    ? `<span class="text-[9px] text-slate-500 font-medium bg-slate-100 px-1.5 py-0.5 rounded flex items-center gap-1"><i class="fa-solid fa-plane-departure text-slate-400"></i> Tiket PP</span>` 
                    : ``;

                const cardHTML = `
                <div class="bg-white border border-slate-200 rounded-xl overflow-hidden hover:shadow-xl hover:border-brand-300 group tour-card flex flex-col relative cursor-pointer">
                    
                    <!-- Top Badges -->
                    <div class="absolute top-2 right-2 z-10 bg-slate-900/80 backdrop-blur text-white text-[9px] font-bold px-1.5 py-1 rounded shadow-sm flex items-center gap-1">
                        <i class="fa-regular fa-clock"></i> ${tour.duration}
                    </div>
                    
                    <!-- Region Badge (INTL/DOM) -->
                    <div class="absolute top-2 left-2 z-10 ${tour.regionColor} text-white text-[9px] font-bold px-1.5 py-1 rounded shadow-sm flex items-center gap-1">
                        <i class="${regionIcon}"></i> ${tour.regionType}
                    </div>
                    
                    <div class="relative h-32 sm:h-40 overflow-hidden">
                        <img src="${tour.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <!-- Tipe Tour ditempatkan di bawah Region Badge -->
                        <span class="absolute bottom-2 left-2 bg-white/95 ${tour.color} text-[9px] font-bold px-2 py-1 rounded backdrop-blur shadow-sm">${tour.type}</span>
                        
                        <!-- Hover Action Icon -->
                        <div class="absolute inset-0 bg-brand-900/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center z-20">
                            <div class="w-8 h-8 rounded-full bg-white text-brand-600 flex items-center justify-center shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-all duration-300"><i class="fa-solid fa-arrow-right -rotate-45"></i></div>
                        </div>
                    </div>
                    
                    <div class="p-3 sm:p-4 flex flex-col flex-grow group-hover:bg-brand-50/20 transition-colors border-t border-slate-100">
                        <div class="flex items-center justify-between mb-1">
                            <div class="flex items-center gap-1 text-[9px] sm:text-[10px] text-slate-500 font-medium">
                                <i class="fa-solid fa-location-dot text-brand-500"></i> ${tour.location}
                            </div>
                            <!-- Flight Included Badge -->
                            ${flightBadge}
                        </div>
                        
                        <h3 class="font-bold text-slate-900 text-xs sm:text-sm mb-2 line-clamp-2 leading-snug group-hover:text-brand-600 transition-colors">${tour.title}</h3>
                        
                        <!-- Rating -->
                        <div class="flex items-center gap-2 mb-3">
                            <div class="flex items-center gap-1">
                                <i class="fa-solid fa-star text-[10px] text-yellow-400"></i>
                                <span class="text-[10px] sm:text-xs font-bold text-slate-700">${tour.rating}</span>
                                <span class="text-[9px] text-slate-400">(${tour.reviews} Ulasan)</span>
                            </div>
                        </div>

                        <!-- Harga & Action -->
                        <div class="mt-auto pt-3 border-t border-slate-100 flex justify-between items-end">
                            <div>
                                ${priceHTML}
                            </div>
                            <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center group-hover:bg-brand-600 group-hover:text-white transition-all shadow-sm">
                                <i class="fa-solid fa-chevron-right text-[10px]"></i>
                            </div>
                        </div>
                    </div>
                </div>
                `;
                gridContainer.innerHTML += cardHTML;
            });
        }

        // Render card saat load
        renderCards();

        // --- SIMULASI FILTER ---
        function simulateFilter() {
            const btn = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            
            // Animasi tombol
            btn.innerText = "Mencari...";
            spinner.classList.remove('hidden');
            gridContainer.style.opacity = '0.5';

            // Simulasi proses delay
            setTimeout(() => {
                btn.innerText = "Terapkan Filter";
                spinner.classList.add('hidden');
                gridContainer.style.opacity = '1';
                
                // Ubah angka total secara acak
                document.getElementById('total-result').innerText = Math.floor(Math.random() * 100) + 20;
            }, 800);
        }

        // --- RESET FILTER ---
        function resetFilters() {
            document.getElementById('filter-search').value = '';
            document.getElementById('filter-min').value = '';
            document.getElementById('filter-max').value = '';
            
            const checkboxes = document.querySelectorAll('.filter-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
            
            simulateFilter();
        }
    </script>
</body>
</html>
