    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        
        /* Custom Scrollbar untuk Filter Sidebar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Custom Checkbox SaaS Style */
        .check-saas {
            appearance: none;
            width: 18px; height: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .check-saas:checked {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .check-saas:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: white;
            font-size: 10px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Hover Card Animations */
        .promo-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .promo-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(79, 70, 229, 0.15); 
            border-color: #c7d2fe;
        }

        /* Dashed Promo Code Box */
        .promo-code-box {
            background-image: repeating-linear-gradient(0deg, #cbd5e1, #cbd5e1 6px, transparent 6px, transparent 12px, #cbd5e1 12px), repeating-linear-gradient(90deg, #cbd5e1, #cbd5e1 6px, transparent 6px, transparent 12px, #cbd5e1 12px), repeating-linear-gradient(180deg, #cbd5e1, #cbd5e1 6px, transparent 6px, transparent 12px, #cbd5e1 12px), repeating-linear-gradient(270deg, #cbd5e1, #cbd5e1 6px, transparent 6px, transparent 12px, #cbd5e1 12px);
            background-size: 2px 100%, 100% 2px, 2px 100% , 100% 2px;
            background-position: 0 0, 0 0, 100% 0, 0 100%;
            background-repeat: no-repeat;
        }
    </style>

                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>

                        <!-- Masa Berlaku -->
                        <div class="border-t border-slate-100 pt-3 flex items-center justify-between">
                            <span class="text-[10px] sm:text-xs ${expColorClass} flex items-center gap-1.5">
                                <i class="fa-regular fa-clock ${expIconColorClass}"></i> ${promo.expDate}
                            </span>
                            <a href="#" class="text-[10px] sm:text-xs font-bold text-brand-600 hover:underline">Syarat & Ketentuan</a>
                        </div>
                    </div>
                </div>
                `;
                gridContainer.innerHTML += cardHTML;
            });
        }

        // Render card saat load
        renderPromos();

        // --- FUNGSI COPY TO CLIPBOARD ---
        function copyPromoCode(code, btnElement) {
            // Menggunakan textarea (Fallback aman untuk iFrame) seperti instruksi
            const textArea = document.getElementById('hidden-clipboard-area');
            textArea.value = code;
            textArea.select();
            document.execCommand('copy');

            // --- Efek Visual Salin Sukses ---
            const icon = btnElement.querySelector('i');
            const originalIconClass = "fa-regular fa-copy";
            const successIconClass = "fa-solid fa-check";
            
            // Ubah ikon tombol ke checklist
            icon.className = successIconClass;
            btnElement.classList.add('bg-green-500', 'text-white', 'border-transparent');
            btnElement.classList.remove('bg-white', 'text-brand-600', 'hover:bg-brand-600');

            // Tampilkan Notifikasi Toast
            const toast = document.getElementById('copy-toast');
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');

            // Kembalikan ke tampilan semula setelah 2 detik
            setTimeout(() => {
                icon.className = originalIconClass;
                btnElement.classList.remove('bg-green-500', 'text-white', 'border-transparent');
                btnElement.classList.add('bg-white', 'text-brand-600', 'hover:bg-brand-600');
                
                // Sembunyikan Toast
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        // --- SIMULASI FILTER ---
        function simulateFilter() {
            const btn = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            
            // Animasi tombol
            btn.innerText = "Memproses...";
            spinner.classList.remove('hidden');
            gridContainer.style.opacity = '0.5';

            // Simulasi proses delay
            setTimeout(() => {
                btn.innerText = "Terapkan Filter Promo";
                spinner.classList.add('hidden');
                gridContainer.style.opacity = '1';
                
                // Ubah angka total secara acak untuk simulasi filter berjalan
                document.getElementById('total-result').innerText = Math.floor(Math.random() * 15) + 5;
            }, 800);
        }

        // --- RESET FILTER ---
        function resetFilters() {
            document.getElementById('filter-search').value = '';
            
            const checkboxes = document.querySelectorAll('.filter-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
            
            // Set beberapa checked by default jika diperlukan, disini semua di uncheck kecuali 'semua'
            simulateFilter();
        }
    </script>
</body>
</html>
